# PowerSync Sync Streams configuration (edition 3)
#
# Paste this into: PowerSync Dashboard → Sync Streams → Edit
# Then click Validate → Deploy.
#
# Each user only receives their own jobs and chat messages (scoped by user_id
# from the JWT sub claim, vended by GET /v1/powersync/token).

config:
  edition: 3

streams:
  user_jobs:
    auto_subscribe: true
    query: >
      SELECT id, user_id, status, input_filename, input_type, fps_used,
             duration_seconds, progress_percent, current_stage,
             queued_at, started_at, completed_at, failed_at, created_at, summary
      FROM jobs
      WHERE jobs.user_id = auth.user_id()

  user_chat_messages:
    auto_subscribe: true
    query: >
      SELECT id, video_id, user_id, role, content, created_at
      FROM chat_messages
      WHERE chat_messages.user_id = auth.user_id()

  user_timeline_entries:
    auto_subscribe: true
    query: >
      SELECT id, job_id, user_id, keyframe_index, timestamp_start, timestamp_end,
             description, detected_objects, camera_movement, confidence
      FROM timeline_entries
      WHERE timeline_entries.user_id = auth.user_id()

  user_library_messages:
    auto_subscribe: true
    query: >
      SELECT id, user_id, role, content, created_at
      FROM library_messages
      WHERE library_messages.user_id = auth.user_id()
