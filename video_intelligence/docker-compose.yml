services:

  # ── Redis — Celery broker + result backend ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      args:
        # VITE_* vars are baked into the frontend bundle by Vite at build time.
        # Set them in your .env file so docker-compose picks them up.
        VITE_GOOGLE_CLIENT_ID:              ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_POWERSYNC_URL:                 ${POWERSYNC_URL:-}
        VITE_FIREBASE_API_KEY:              ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN:          ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID:           ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET:       ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID:  ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID:               ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_VAPID_KEY:            ${VITE_FIREBASE_VAPID_KEY:-}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Container-internal overrides — take precedence over .env values.
      REDIS_URL: redis://redis:6379/0
      OUTPUT_DIR: /app/output
    volumes:
      - output:/app/output   # job files, result.json, hash_index.json
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery worker ──────────────────────────────────────────────────────────
  # Same image as `api` — different entrypoint.
  # Scale with: docker compose up --scale worker=2
  worker:
    build:
      context: .
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_POWERSYNC_URL:    ${POWERSYNC_URL:-}
    restart: unless-stopped
    command: >
      celery -A workers.pipeline_worker worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=5
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OUTPUT_DIR: /app/output
    volumes:
      - output:/app/output
    depends_on:
      redis:
        condition: service_healthy

  # ── Mastra cross-video AI agent ────────────────────────────────────────────
  mastra:
    build:
      context: ./mastra
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3001"
      # @ai-sdk/google reads GOOGLE_GENERATIVE_AI_API_KEY; alias GEMINI_API_KEY
      GOOGLE_GENERATIVE_AI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  output:
